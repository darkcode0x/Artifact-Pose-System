services:
  postgres:
    image: postgres:16-alpine
    container_name: artifact_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-artifact_auth}
      POSTGRES_USER: ${POSTGRES_USER:-artifact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artifact123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artifact} -d ${POSTGRES_DB:-artifact_auth}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: artifact_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artifact_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      APP_NAME: ${APP_NAME:-IoT Artifact Server}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      DATA_DIR: /app/data
      MODEL_DIR: /app/model
      RUN_POSE_ON_UPLOAD: ${RUN_POSE_ON_UPLOAD:-true}
      RUN_AI_ON_UPLOAD: ${RUN_AI_ON_UPLOAD:-false}
      AUTO_DISPATCH_POSE_COMMAND: ${AUTO_DISPATCH_POSE_COMMAND:-true}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql+psycopg://artifact:artifact123@postgres:5432/artifact_auth}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_KEEPALIVE_SEC: ${MQTT_KEEPALIVE_SEC:-60}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_QOS: ${MQTT_QOS:-1}
      MQTT_CMD_TOPIC_TEMPLATE: ${MQTT_CMD_TOPIC_TEMPLATE:-cmd/{device_id}}
      MQTT_ACK_TOPIC_TEMPLATE: ${MQTT_ACK_TOPIC_TEMPLATE:-ack/{device_id}}
      MQTT_STATUS_TOPIC_TEMPLATE: ${MQTT_STATUS_TOPIC_TEMPLATE:-status/{device_id}}
      ARTIFACT_POSE_ROOT: ${ARTIFACT_POSE_ROOT:-/app/app/modules/artifact_pose}
      ARTIFACT_CAMERA_PARAMS_DIR: ${ARTIFACT_CAMERA_PARAMS_DIR:-/app/data/camera_params}
      ARTIFACT_LENS_POSITION: ${ARTIFACT_LENS_POSITION:-1.5}
      ACK_HISTORY_LIMIT: ${ACK_HISTORY_LIMIT:-200}
      MAX_ALIGNMENT_ITERATIONS: ${MAX_ALIGNMENT_ITERATIONS:-20}
      ALIGNMENT_TIMEOUT_SEC: ${ALIGNMENT_TIMEOUT_SEC:-300}
      SIGN_MOVE_X: ${SIGN_MOVE_X:-1}
      SIGN_MOVE_Z: ${SIGN_MOVE_Z:-1}
      SIGN_ROTATE_PAN: ${SIGN_ROTATE_PAN:-1}
      SIGN_ROTATE_TILT: ${SIGN_ROTATE_TILT:-1}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-CHANGE_ME_AUTH_SECRET}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: ${AUTH_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ../model:/app/model
    command: >
      sh -c "
          PYTHONPATH=/app python tools/create_admin.py --username ${ADMIN_USERNAME:-admin} --password ${ADMIN_PASSWORD:-123456} --role admin &&
        uvicorn run:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
